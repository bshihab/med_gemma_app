name: Localabs
options:
  bundleIdPrefix: com.bilalshihab
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  fileTypes:
    icon:
      file: true
      lastKnownFileType: folder.iconcomposer.icon

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""

packages:
  llama-binary:
    path: ../llama-binary

targets:
  Localabs:
    type: application
    platform: iOS
    sources:
      - path: Localabs
        excludes:
          - "AppIcon.icon/**"
      - path: Localabs/AppIcon.icon
        type: folder
    dependencies:
      - package: llama-binary
        product: llama
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bilalshihab.Localabs
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: 1
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: false
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_NSCameraUsageDescription: "Localabs uses the camera to scan physical lab reports and medical documents for AI analysis."
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Localabs accesses your photo library so you can select existing photos of lab reports."
        INFOPLIST_KEY_NSHealthShareUsageDescription: "Localabs reads your Apple Health data to provide personalized context alongside your lab report analysis."
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: "Localabs does not write any data to Apple Health."
        # Points the build at the top-level AppIcon.icon bundle
        # (Localabs/AppIcon.icon) as the active home-screen icon
        # source. Xcode 26 reads this setting and threads the .icon
        # into the app's Info.plist (CFBundleIcons) automatically.
        # The actool warning about "None of the input catalogs
        # contained a matching ... AppIcon" is harmless noise from
        # actool's parallel catalog scan — it doesn't block the
        # build and the icon installs correctly.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES
    # HealthKit entitlement. The `properties:` block makes XcodeGen
    # *write* the key into the entitlements file AND wire
    # CODE_SIGN_ENTITLEMENTS so the signer actually sees it. Without
    # `properties:`, the file may exist on disk with the key but never
    # get applied at code-sign time — runtime then errors with
    # "Missing com.apple.developer.healthkit entitlement" even though
    # the file looks correct.
    #
    # Requires:
    #   - Paid Apple Developer Program membership (free Personal Team
    #     can't sign a profile that includes HealthKit).
    #   - The HealthKit capability enabled on the App ID in the Apple
    #     Developer portal — or, easier, add the capability via Xcode's
    #     Signing & Capabilities tab once and Xcode auto-updates the
    #     profile.
    #
    # Do NOT add `com.apple.developer.healthkit.access` — that's the
    # Clinical Records / Verifiable Health Records capability, a separate
    # gate requiring per-app Apple approval. We only read HKQuantityType
    # / HKCategoryType, which the basic entitlement covers.
    entitlements:
      path: Localabs/Localabs.entitlements
      properties:
        com.apple.developer.healthkit: true
